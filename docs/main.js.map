<nav class="navbar">
  <div class="logo">Janus<span>.dev</span></div>

  <div class="hamburger" (click)="toggleMenu()" [class.active]="isMenuOpen">
    <span class="bar"></span>
    <span class="bar"></span>
    <span class="bar"></span>
  </div>

  <ul class="nav-links" [class.active]="isMenuOpen">
    <li>
      <a routerLink="/" routerLinkActive="active" 
         [routerLinkActiveOptions]="{ exact: true }" 
         (click)="closeMenu()">Home</a>
    </li>

    <li routerLinkActive="active">
      <app-dropdown
        label="Skills"
        [items]="[
          { label: 'Technical Skills', link: '/skills/technical' },
          { label: 'Soft Skills', link: '/skills/soft' }
        ]">
        </app-dropdown>
    </li>

    <li>
      <a routerLink="/experience" routerLinkActive="active" (click)="closeMenu()">Experience</a>
    </li>
    <li>
      <a routerLink="/education" routerLinkActive="active" (click)="closeMenu()">Education</a>
    </li>
    <li>
      <a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact</a>
    </li>
  </ul>
</nav>
