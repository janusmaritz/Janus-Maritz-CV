<section class="skills-section" [@fadeIn]>
  <h2 class="skills-title">Technical Skills</h2>

  <div class="skills-grid">
    <div class="skill-card" *ngFor="let group of skillCategories">
      <h3 class="skill-name">
        <i [class]="group.icon + ' skill-icon'"></i>
        {{ group.category }}
      </h3>
      
      <div class="skill-tags">
        <span class="skill-tag" *ngFor="let item of group.items">
          {{ item }}
        </span>
      </div>
    </div>
  </div>
</section>
